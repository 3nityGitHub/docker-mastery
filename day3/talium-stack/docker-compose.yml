version: "3.8"

services:

  app:
    build: .
    container_name: talium-app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: talium
      DB_USER: admin
      DB_PASSWORD: secret
    depends_on:
      - db
    networks:
      - talium-net

  db:
    image: postgres:15-alpine
    container_name: talium-db
    environment:
      POSTGRES_DB: talium
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - talium-net

volumes:
  postgres-data:

networks:
  talium-net:
    driver: bridge
