services:
  app:
    build: .
    container_name: talium-app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: talium
      DB_USER: admin
      DB_PASSWORD: secret
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - talium-net

  db:
    image: postgres:15-alpine
    container_name: talium-db
    environment:
      POSTGRES_DB: talium
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talium-net

  redis:
    image: redis:7-alpine
    container_name: talium-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talium-net

volumes:
  pgdata:
  redisdata:

networks:
  talium-net:
